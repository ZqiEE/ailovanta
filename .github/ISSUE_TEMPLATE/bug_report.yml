name: Bug report
description: Report a problem in the public Ailovanta MVP
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Ailovanta. Please do not include secrets, private logs, user data, model weights, or private datasets.
  - type: input
    id: component
    attributes:
      label: Component
      description: Which part is affected?
      placeholder: API, node client, dashboard, docs, Docker, tests
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the problem.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps.
      placeholder: |
        1. Run ...
        2. Open ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Python version, Docker version, browser
    validations:
      required: false
