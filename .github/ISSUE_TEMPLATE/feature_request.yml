name: Feature request
description: Suggest an improvement for the public Ailovanta MVP
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Please keep requests focused on the public shell, local API, node client, docs, demos, or developer experience.
  - type: input
    id: component
    attributes:
      label: Component
      placeholder: API, node client, dashboard, docs, Docker, tests
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: boundary
    attributes:
      label: Public/private boundary check
      description: Does this belong in the public repository or Ailovanta Core?
      placeholder: This belongs in the public repository because...
    validations:
      required: true
